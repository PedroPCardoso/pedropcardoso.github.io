<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Pedro Cardoso · Full Stack Developer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Styles -->
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background ── */
.wrapper {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  position: relative;
  overflow: hidden;
}

/* Animated gradient orbs */
.wrapper::before {
  content: '';
  position: fixed;
  top: -30%;
  left: -20%;
  width: 60%;
  height: 60%;
  background: radial-gradient(circle, rgba(147, 51, 234, 0.35) 0%, transparent 70%);
  animation: orbFloat 12s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

.wrapper::after {
  content: '';
  position: fixed;
  bottom: -20%;
  right: -15%;
  width: 55%;
  height: 55%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
  animation: orbFloat 15s ease-in-out infinite alternate-reverse;
  pointer-events: none;
  z-index: 0;
}

@keyframes orbFloat {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 40px) scale(1.15); }
}

/* ── Main container ── */
.container {
  position: relative;
  z-index: 2;
  max-width: 480px;
  margin: 0 auto;
  padding: 60px 20px 80px;
  text-align: center;
}

/* ── Profile card ── */
.profile-card {
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 24px;
  padding: 40px 32px 32px;
  margin-bottom: 28px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
  animation: fadeSlideDown 0.7s ease both;
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Avatar ── */
.backdrop {
  display: block;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin: 0 auto 20px;
  border: 3px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 0 0 6px rgba(147, 51, 234, 0.25), 0 0 30px rgba(147, 51, 234, 0.4);
  animation: avatarPulse 3s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 0 6px rgba(147, 51, 234, 0.25), 0 0 30px rgba(147, 51, 234, 0.4); }
  50%       { box-shadow: 0 0 0 10px rgba(147, 51, 234, 0.15), 0 0 50px rgba(147, 51, 234, 0.55); }
}

/* ── Profile text ── */
.profile-name {
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.profile-role {
  font-size: 0.95rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.65);
  letter-spacing: 0.5px;
}

/* ── Social icons row ── */
.social-icons {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 20px;
}

.social-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.95rem;
  text-decoration: none;
  transition: background 0.25s, color 0.25s, transform 0.25s, box-shadow 0.25s;
}

.social-icon:hover {
  background: rgba(147, 51, 234, 0.5);
  color: #fff;
  transform: translateY(-3px) scale(1.1);
  box-shadow: 0 6px 20px rgba(147, 51, 234, 0.45);
}

/* ── Link buttons ── */
.links-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: fadeSlideUp 0.7s ease 0.2s both;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 22px;
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 14px;
  color: rgba(255, 255, 255, 0.9);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  position: relative;
  overflow: hidden;
}

.link-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(147, 51, 234, 0.15), rgba(99, 102, 241, 0.15));
  opacity: 0;
  transition: opacity 0.25s;
}

.link-btn:hover {
  background: rgba(255, 255, 255, 0.13);
  border-color: rgba(147, 51, 234, 0.5);
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 8px 28px rgba(147, 51, 234, 0.3);
  color: #fff;
  text-decoration: none;
}

.link-btn:hover::before {
  opacity: 1;
}

.link-btn:active {
  transform: translateY(0) scale(0.99);
}

.link-btn .btn-icon {
  font-size: 1.15rem;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.link-btn .btn-text {
  position: relative;
  z-index: 1;
}

/* Portfolio button highlight */
.link-btn.btn-portfolio {
  background: linear-gradient(135deg, rgba(147, 51, 234, 0.3), rgba(99, 102, 241, 0.3));
  border-color: rgba(147, 51, 234, 0.45);
}

.link-btn.btn-portfolio:hover {
  background: linear-gradient(135deg, rgba(147, 51, 234, 0.5), rgba(99, 102, 241, 0.5));
}

/* ── Floating bubbles (kept, enhanced) ── */
.bg-bubbles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  list-style: none;
}

.bg-bubbles li {
  position: absolute;
  list-style: none;
  display: block;
  border-radius: 50%;
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  bottom: -200px;
  animation: bubbleRise 25s infinite linear;
}

.bg-bubbles li:nth-child(1)  { left: 10%;  width: 40px;  height: 40px; }
.bg-bubbles li:nth-child(2)  { left: 20%;  width: 80px;  height: 80px;  animation-delay: 2s;  animation-duration: 17s; }
.bg-bubbles li:nth-child(3)  { left: 25%;  width: 40px;  height: 40px;  animation-delay: 4s; }
.bg-bubbles li:nth-child(4)  { left: 40%;  width: 60px;  height: 60px;  animation-duration: 22s; background-color: rgba(147, 51, 234, 0.12); }
.bg-bubbles li:nth-child(5)  { left: 70%;  width: 40px;  height: 40px; }
.bg-bubbles li:nth-child(6)  { left: 80%;  width: 120px; height: 120px; animation-delay: 3s;  background-color: rgba(99, 102, 241, 0.1); }
.bg-bubbles li:nth-child(7)  { left: 32%;  width: 160px; height: 160px; animation-delay: 7s; }
.bg-bubbles li:nth-child(8)  { left: 55%;  width: 20px;  height: 20px;  animation-delay: 15s; animation-duration: 40s; }
.bg-bubbles li:nth-child(9)  { left: 25%;  width: 10px;  height: 10px;  animation-delay: 2s;  animation-duration: 40s; background-color: rgba(255, 255, 255, 0.12); }
.bg-bubbles li:nth-child(10) { left: 90%;  width: 160px; height: 160px; animation-delay: 11s; }

@keyframes bubbleRise {
  0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.6; }
  100% { transform: translateY(-110vh) rotate(600deg); opacity: 0; }
}

/* ── Misc ── */
a {
  outline: none;
  text-decoration: none;
}

/* ── Responsive tweaks ── */
@media (max-width: 480px) {
  .container {
    padding: 40px 16px 60px;
  }
  .profile-card {
    padding: 32px 20px 24px;
  }
}
  </style>
</head>
